<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arduino + FunShield Emulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Arduino Uno + FunShield Emulator</h1>
            <div id="controls">
                <button id="btn-compile" title="Compile & Upload">Compile & Upload</button>
                <button id="btn-stop" title="Stop" disabled>Stop</button>
                <button id="btn-reset" title="Reset" disabled>Reset</button>
                <span id="status-indicator">Ready</span>
            </div>
        </header>

        <div id="main-layout">
            <!-- Code Editor Panel -->
            <div id="editor-panel">
                <div id="editor-header">
                    <span>solution.ino</span>
                    <select id="example-select">
                        <option value="">-- Load Example --</option>
                        <option value="blink">Lab 2: Blinking LEDs</option>
                        <option value="knight">Lab 2: Knight Rider</option>
                        <option value="counter">Lab 3: Button Counter</option>
                        <option value="segment">Lab 4: Segment Display</option>
                        <option value="stopwatch">Lab 5: Stopwatch</option>
                        <option value="scroll">Lab 6: Scrolling Text</option>
                    </select>
                </div>
                <textarea id="code-editor" spellcheck="false">// Arduino + FunShield Emulator
// Write your Arduino code here!

#include "funshield.h"

void setup() {
  pinMode(led1_pin, OUTPUT);
  pinMode(led2_pin, OUTPUT);
  pinMode(led3_pin, OUTPUT);
  pinMode(led4_pin, OUTPUT);
}

int currentLed = 0;
unsigned long lastChange = 0;
const int DELAY = 300;

void loop() {
  unsigned long now = millis();
  if (now - lastChange >= DELAY) {
    // Turn off all LEDs
    digitalWrite(led1_pin, OFF);
    digitalWrite(led2_pin, OFF);
    digitalWrite(led3_pin, OFF);
    digitalWrite(led4_pin, OFF);

    // Turn on current LED
    int pins[] = {led1_pin, led2_pin, led3_pin, led4_pin};
    digitalWrite(pins[currentLed], ON);

    currentLed = (currentLed + 1) % 4;
    lastChange = now;
  }
}</textarea>

                <!-- Serial Monitor -->

                        <button id="serial-clear">Clear</button>

                    <div id="serial-output"></div>

                <!-- Compiler output -->
